<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agregar {{ tipo }}</title>
    <style>
        body { font-family: sans-serif; background: #3498db; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .form-card { background: white; padding: 30px; border-radius: 15px; width: 350px; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; }
        button { background: #2ecc71; color: white; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>Añadir {{ tipo|capitalize }}</h2>
        <form method="POST">
            <input type="text" name="descripcion" placeholder="Descripción (Ej: Renta, Sueldo...)" required>
            <input type="number" step="0.01" name="monto" placeholder="Monto $" required>
            
            {% if tipo == 'movimiento' %}
            <select name="categoria">
                <option value="Comida">Comida</option>
                <option value="Ocio">Ocio</option>
                <option value="Varios">Varios</option>
            </select>
            <select name="tipo">
                <option value="Gasto">Gasto</option>
                <option value="Ingreso">Ingreso</option>
            </select>
            {% elif tipo == 'fijo' %}
            <input type="number" name="dia" placeholder="Día de cobro mensual (1-31)" min="1" max="31" required>
            {% endif %}

            <button type="submit">Guardar en Sistema</button>
            <a href="/dashboard" style="display:block; text-align:center; color:#999; text-decoration:none;">Cancelar</a>
        </form>
    </div>
</body>
</html>
